<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simplified Metagenomics Workflow Explorer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            color: #333;
        }

        h1 {
            text-align: center;
            color: #4A90E2;
        }

        #nav {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            gap: 15px;
        }

        .step-button {
            padding: 10px 20px;
            background-color: #f0f0f0;
            border: 2px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: bold;
        }

        .step-button:hover, .step-button.active {
            background-color: #4A90E2;
            color: white;
            border-color: #4A90E2;
        }

        #content-panel {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 10px;
            background-color: #fafafa;
        }

        h2 {
            color: #4A90E2;
            margin-top: 0;
        }

        .description {
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .visualization {
            text-align: center;
            margin-bottom: 20px;
            display: flex; /* Allow content inside viz to flow vertically/horizontally */
            flex-direction: column;
            align-items: center;
        }

        /* Simplified generic microbial icons for Step 1 */
        .microbe-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .microbe {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-block;
        }
        .microbe.bacteria { background-color: #7ED321; }
        .microbe.virus { background-color: #FF6B6B; }

        /* DNA helix for Step 2 */
        .dna-helix {
            width: 100px;
            height: 50px;
            border: 2px solid #4A90E2;
            border-radius: 25px;
            position: relative;
            margin-bottom: 10px;
        }
        .dna-strand {
            position: absolute;
            width: 80px;
            height: 2px;
            background-color: #4A90E2;
            top: 50%;
            left: 10px;
            transform-origin: center;
        }
        .dna-strand.one { transform: translateY(-5px) rotate(15deg); }
        .dna-strand.two { transform: translateY(3px) rotate(-15deg); }

        /* Sequence read visualization for Step 3 */
        .raw-reads {
            font-family: monospace;
            background-color: #eee;
            padding: 10px;
            border-radius: 5px;
            max-width: 400px;
            word-break: break-all;
            margin-bottom: 10px;
        }

        /* Chart-like visualizations for Step 4 */
        .chart-panel {
            display: flex;
            flex-direction: column; /* Vertical stacking of charts/sections */
            gap: 30px; /* Space between the two charts */
            margin-top: 20px;
        }

        .chart-section {
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 8px;
            background-color: #fff;
        }

        .chart-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #4A90E2;
        }

        /* Simplified illustrative charts */
        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .bar-container {
            display: flex;
            align-items: center;
        }
        .bar-label {
            width: 150px;
            text-align: right;
            margin-right: 10px;
            font-size: 0.9em;
        }
        .bar {
            height: 15px;
            border-radius: 3px;
            background-color: #4A90E2;
        }

        .pie-chart {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-image: conic-gradient(
                #7ED321 0% 40%, /* Metabolism */
                #F8E71C 40% 60%, /* Stress */
                #F5A623 60% 75%, /* Cellular */
                #FF6B6B 75% 85%, /* Signal */
                #4A90E2 85% 93%, /* Transport */
                #ccc 93% 100% /* Other */
            );
            margin: 0 auto;
        }
        .pie-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
            font-size: 0.8em;
        }
        .legend-item { display: flex; align-items: center; }
        .legend-color {
            width: 12px;
            height: 12px;
            margin-right: 5px;
            border-radius: 2px;
        }

    </style>
</head>

    <h1>Simplified Metagenomics Workflow Explorer</h1>
