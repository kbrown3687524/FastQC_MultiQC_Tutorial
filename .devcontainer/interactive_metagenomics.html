<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simplified Metagenomics Workflow Explorer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px;
            background-color: #f4f7f9;
            color: #333;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            /* SET CONSTANT HEIGHT HERE */
            height: 650px; 
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden; /* Prevents content from pushing the box out */
            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        #nav {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            flex-shrink: 0;
        }

        .step-button {
            padding: 10px 15px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: #7f8c8d;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            font-size: 0.9rem;
        }

        .step-button:hover {
            color: #4A90E2;
        }

        .step-button.active {
            color: #4A90E2;
            border-bottom: 3px solid #4A90E2;
        }

        #content-panel {
            flex-grow: 1; /* Allows content to fill space without resizing container */
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            color: #4A90E2;
            margin-top: 0;
        }

        .description {
            margin-bottom: 20px;
            line-height: 1.5;
            font-size: 1.05rem;
            height: 60px; /* Fixed height for text area */
        }

        .visualization {
            text-align: center;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1; /* Takes up remaining space in the fixed container */
            min-height: 300px;
        }

        .chart-box {
            width: 100%;
            max-width: 450px;
            margin: 5px 0;
            text-align: left;
        }

        .bar-wrap {
            background: #ddd;
            border-radius: 4px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .bar-fill {
            height: 22px;
            background: #4A90E2;
            display: flex;
            align-items: center;
            padding-left: 10px;
            color: white;
            font-size: 0.75rem;
            transition: width 0.8s ease-in-out;
        }

        .pie-placeholder {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: conic-gradient(#7ED321 0% 40%, #F8E71C 40% 70%, #FF6B6B 70% 100%);
            margin: 10px auto;
        }

        .dna-icon { font-size: 60px; margin-bottom: 10px;}
    </style>
</head>
<body>

<div class="container">
    <h1>Metagenomics Explorer</h1>

    <div id="nav">
        <button class="step-button active" onclick="showStep(1)" id="btn1">1. COLLECTION</button>
        <button class="step-button" onclick="showStep(2)" id="btn2">2. EXTRACTION</button>
        <button class="step-button" onclick="showStep(3)" id="btn3">3. SEQUENCING</button>
        <button class="step-button" onclick="showStep(4)" id="btn4">4. INSIGHTS</button>
    </div>

    <div id="content-panel">
        <h2 id="step-header">Step 1: Community Sampling</h2>
        <div id="step-description" class="description"></div>
        
        <div id="step-visualization" class="visualization">
        </div>
    </div>
</div>

<script>
    const stepData = {
        1: {
            header: "Step 1: Community Sampling",
            description: "The process begins with a sample (e.g., nasal swab, soil, water). This contains a mix of host cells, bacteria, viruses, and fungi.",
            viz: "<div class='dna-icon'>🧪</div><p>Nasal Swab / Environmental Sample</p>"
        },
        2: {
            header: "Step 2: DNA/RNA Extraction",
            description: "Cells are lysed (broken open) and the total genetic material is purified, removing proteins and other cellular debris.",
            viz: "<div class='dna-icon'>🧬</div><p>Purified Nucleic Acids</p>"
        },
        3: {
            header: "Step 3: Library Prep & Sequencing",
            description: "DNA is fragmented, tagged with adapters, and read by a sequencer (like Illumina), resulting in millions of raw data 'reads'.",
            viz: "<div class='dna-icon'>💻</div><p style='font-family:monospace;'>A G T C C G T A ...</p>"
        },
        4: {
            header: "Step 4: Consolidated Insights",
            description: "Bioinformatics tools analyze the data to determine 'Who is there?' (Taxonomy) and 'What are they doing?' (Function).",
            viz: `
                <div class="chart-box">
                    <strong>Taxonomic Composition</strong>
                    <div class="bar-wrap"><div class="bar-fill" style="width: 70%">Bacteria (70%)</div></div>
                    <div class="bar-wrap"><div class="bar-fill" style="background:#FF6B6B; width: 20%">Viruses (20%)</div></div>
                    <div class="bar-wrap"><div class="bar-fill" style="background:#F8E71C; width: 10%">Fungi (10%)</div></div>
                </div>
                <div class="chart-box">
                    <strong>Functional Potential</strong>
                    <div class="pie-placeholder"></div>
                    <center><small>Metabolism | Stress Response | Growth</small></center>
                </div>
            `
        }
    };

    function showStep(stepNum) {
        document.querySelectorAll('.step-button').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn' + stepNum).classList.add('active');

        const panel = document.getElementById('content-panel');
        panel.style.opacity = 0;
        
        setTimeout(() => {
            document.getElementById('step-header').innerText = stepData[stepNum].header;
            document.getElementById('step-description').innerText = stepData[stepNum].description;
            document.getElementById('step-visualization').innerHTML = stepData[stepNum].viz;
            panel.style.opacity = 1;
        }, 150);
    }

    showStep(1);
</script>

</body>
</html>
